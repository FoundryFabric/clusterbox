apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: traefik
  namespace: kube-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/managed-by: clusterbox
spec:
  chart: traefik
  repo: https://traefik.github.io/charts
  version: "33.2.1"
  targetNamespace: traefik
  createNamespace: false
  valuesContent: |-
    deployment:
      replicas: 1

    service:
      type: LoadBalancer

    ports:
      web:
        port: 80
        exposedPort: 80
        # Traefik v3 redirect syntax (v2 used redirectTo which no longer works)
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
      websecure:
        port: 443
        exposedPort: 443

    persistence:
      enabled: true
      size: 128Mi

    globalArguments:
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"

    logs:
      general:
        level: INFO

    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true
