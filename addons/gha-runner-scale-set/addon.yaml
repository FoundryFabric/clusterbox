name: gha-runner-scale-set
version: 0.1.0
description: GitHub Actions Runner Controller (scale sets) for self-hosted runners on the cluster.

# Required secrets, looked up via the existing secrets backend.
secrets:
  - key: GH_APP_ID
    description: GitHub App ID
    required: true
  - key: GH_APP_INSTALLATION_ID
    description: GitHub App Installation ID
    required: true
  - key: GH_APP_PRIVATE_KEY
    description: PEM-encoded private key
    required: true

# Optional pre-install requirements.
requires: []

# Manifest application strategy: 'manifests' or 'helmchart'.
strategy: helmchart
