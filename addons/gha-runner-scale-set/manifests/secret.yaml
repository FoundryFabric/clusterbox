apiVersion: v1
kind: Secret
metadata:
  name: controller-manager-gh-credentials
  namespace: arc-systems
  labels:
    app.kubernetes.io/name: gha-runner-scale-set-controller
    app.kubernetes.io/managed-by: clusterbox
type: Opaque
# stringData lets Kubernetes base64-encode each value server-side. The
# clusterbox installer substitutes ${...} placeholders against the resolved
# secret bundle as raw strings (see internal/addon/installer.go), so we cannot
# pre-encode them in the data: block — using stringData is the correct way to
# pass raw secret values through the installer's templating step.
#
# The keys below match the schema consumed by the actions/actions-runner-controller
# `gha-runner-scale-set` Helm chart's `githubConfigSecret` value: operators
# referencing this Secret from an AutoscalingRunnerSet (see README) get the
# right field names automatically.
stringData:
  # GitHub App authentication path (recommended).
  github_app_id: "${GH_APP_ID}"
  github_app_installation_id: "${GH_APP_INSTALLATION_ID}"
  github_app_private_key: |
    ${GH_APP_PRIVATE_KEY}
  # GitHub Personal Access Token authentication path (alternative to the
  # GitHub App fields above).
  github_token: "${GH_PAT_TOKEN}"
