# AutoscalingRunnerSet with Docker-in-Docker support.
#
# Used by jobs that need Docker (release Docker builds, image pushes).
# Plain CI jobs use server-runners instead — no DinD overhead there.
#
# TLS is intentionally disabled: dind listens on plain TCP 2375 (localhost
# only within the pod). This avoids the cert-timing race where the runner
# starts before dind has written /certs/client/ca.pem.
#
# Apply:
#   kubectl apply -f server-runners-docker-scaleset.yaml
apiVersion: actions.github.com/v1alpha1
kind: AutoscalingRunnerSet
metadata:
  name: server-runners-docker
  namespace: arc-runners
  labels:
    actions.github.com/scale-set-version: "0.14.1"
    app.kubernetes.io/version: "0.14.1"
spec:
  githubConfigUrl: https://github.com/FoundryFabric/server
  githubConfigSecret: controller-manager-gh-credentials
  minRunners: 0
  maxRunners: 1
  runnerGroup: default
  template:
    spec:
      initContainers:
        # Copy runner externals into the shared volume so action tool binaries
        # are available at runtime.
        - name: init-dind-externals
          image: ghcr.io/actions/actions-runner:2.334.0
          command: ["cp", "-r", "-v", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:2.334.0
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: dind
          image: docker:27-dind
          args:
            - dockerd
            - --host=tcp://0.0.0.0:2375
            - --host=unix:///var/run/docker.sock
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}
