apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: grafana
  namespace: kube-system
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/managed-by: clusterbox
spec:
  chart: grafana
  repo: https://grafana.github.io/helm-charts
  version: "8.2.1"
  targetNamespace: monitoring
  createNamespace: false
  valuesContent: |-
    # Use the clusterbox-managed secret when GRAFANA_ADMIN_PASSWORD was provided;
    # Grafana auto-generates a password otherwise (retrieve with:
    #   kubectl get secret grafana -n monitoring -o jsonpath='{.data.admin-password}' | base64 -d
    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-user
      passwordKey: admin-password
    adminUser: admin
    service:
      type: ClusterIP
    persistence:
      enabled: true
      size: 1Gi
    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/"
