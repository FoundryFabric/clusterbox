apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: telemetry
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/managed-by: clusterbox
    dashboards: grafana
spec:
  config:
    security:
      admin_user: admin
      admin_password: "${GRAFANA_ADMIN_PASSWORD}"
    server:
      root_url: "%(protocol)s://%(domain)s/"
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              image: grafana/grafana:10.4.0
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/managed-by: clusterbox
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
