apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: grafana-operator
  namespace: kube-system
  labels:
    app.kubernetes.io/name: grafana-operator
    app.kubernetes.io/managed-by: clusterbox
spec:
  chart: grafana-operator
  repo: https://grafana.github.io/grafana-operator/
  # Upstream releases: https://github.com/grafana/grafana-operator/releases
  version: "v5.6.0"
  targetNamespace: grafana-operator
  createNamespace: false
  valuesContent: |-
    image:
      repository: ghcr.io/grafana/grafana-operator
      tag: v5.6.0
    # Watch all namespaces so Grafana CRs can live in 'monitoring'.
    watchNamespaces: []
