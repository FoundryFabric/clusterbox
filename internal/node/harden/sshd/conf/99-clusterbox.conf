# FoundryFabric clusterbox sshd hardening overrides.
#
# Dropped in by clusterboxnode harden section. Mirrors the packer
# baseline so a freshly-installed node and a packer-built image converge
# on the same effective sshd config.
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
