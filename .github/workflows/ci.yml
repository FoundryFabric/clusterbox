name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "packer/**"
      - "docs/packer.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "packer/**"
      - "docs/packer.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
