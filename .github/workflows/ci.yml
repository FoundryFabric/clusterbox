name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "packer/**"
      - "docs/packer.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "packer/**"
      - "docs/packer.md"

jobs:
  build:
    runs-on: clusterbox-runners
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build agent bundle (cross-compile clusterboxnode for embed)
        run: make internal/agentbundle/agents/clusterboxnode-linux-amd64 internal/agentbundle/agents/clusterboxnode-linux-arm64

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
